esphome:
  name: modbus-tcp-slave-demo

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: local
      path: ../components
    components: [modbus_tcp_slave]

globals:
  - id: holding_register_0
    type: uint16_t
    restore_value: no
    initial_value: '230'
  - id: holding_register_1
    type: uint16_t
    restore_value: no
    initial_value: '0'

sensor:
  - platform: template
    name: "Holding Register 0"
    lambda: return id(holding_register_0);
    update_interval: 5s

interval:
  - interval: 5s
    then:
      - lambda: |-
          id(holding_register_1)++;

modbus_tcp_slave:
  port: 502
  unit_id: 1
  courtesy_response:
    enabled: true
    register_last_address: 10
    register_value: 0
  registers:
    - address: 0
      value_type: U_WORD
      read_lambda: return id(holding_register_0);
      write_lambda: |-
        id(holding_register_0) = x;
        return true;
    - address: 1
      value_type: U_WORD
      read_lambda: return id(holding_register_1);
      write_lambda: |-
        id(holding_register_1) = x;
        return true;
